# .github/workflows/bounty-payout.yml
# BigNuten Bounty Payout Workflow
#
# Manually triggered by @TheJollyLaMa to approve a $BNUT payout to a contributor
# after they have completed a bounty issue and their PR has been merged.
#
# Workflow:
#   1. Owner fills in contributor address, BNUT amount, and issue number
#   2. Workflow logs the payout details for audit trail
#   3. Workflow calls payContributor() on the BigNutenTreasury contract on-chain
#   4. Posts a confirmation comment on the GitHub issue with the transaction hash
#
# Related issues: #45 (bounty bot), #46 (bounty label system)
#
# Required GitHub Secrets (set in repo Settings → Secrets → Actions):
#   GITHUB_TOKEN              — automatically provided by GitHub Actions
#   PRIVATE_KEY               — deployer wallet private key (for contract calls)
#   TREASURY_CONTRACT_ADDRESS — deployed BigNutenTreasury address
#   POLYGON_RPC_URL           — (or BASE_RPC_URL / OPTIMISM_RPC_URL)

name: Bounty Payout

on:
  workflow_dispatch:
    inputs:
      contributor_address:
        description: "Contributor wallet address (0x…)"
        required: true
        type: string
      amount_bnut:
        description: "Amount of BNUT to pay (whole tokens, e.g. 500)"
        required: true
        type: string
      issue_number:
        description: "GitHub issue number being paid out (e.g. 45)"
        required: true
        type: string
      network:
        description: "Target network"
        required: true
        default: "polygon_mumbai"
        type: choice
        options:
          - polygon_mumbai
          - base_sepolia
          - optimism_sepolia

jobs:
  payout:
    name: Approve $BNUT Payout
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      # ── 1. Log payout details ──────────────────────────────────────────────
      - name: Log payout details
        run: |
          echo "════════════════════════════════════"
          echo "  BigNuten Bounty Payout"
          echo "════════════════════════════════════"
          echo "  Issue number       : #${{ github.event.inputs.issue_number }}"
          echo "  Contributor address: ${{ github.event.inputs.contributor_address }}"
          echo "  BNUT amount        : ${{ github.event.inputs.amount_bnut }} BNUT"
          echo "  Network            : ${{ github.event.inputs.network }}"
          echo "  Approved by        : ${{ github.actor }}"
          echo "════════════════════════════════════"

      # ── 2. Checkout repository (needed for scripts/payContributor.js) ─────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 3. Set up Node.js ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 4. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Execute on-chain payout via payContributor.js ─────────────────
      - name: Execute on-chain payout
        id: payout
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          OPTIMISM_RPC_URL: ${{ secrets.OPTIMISM_RPC_URL }}
          TREASURY_CONTRACT_ADDRESS: ${{ secrets.TREASURY_CONTRACT_ADDRESS }}
          CONTRIBUTOR_ADDRESS: ${{ github.event.inputs.contributor_address }}
          BNUT_AMOUNT: ${{ github.event.inputs.amount_bnut }}
          ISSUE_REF: "TheJollyLaMa/BigNuten_Vanilla#${{ github.event.inputs.issue_number }}"
        run: |
          SCRIPT_OUTPUT=$(npx hardhat run scripts/payContributor.js \
            --network ${{ github.event.inputs.network }} 2>&1)
          echo "$SCRIPT_OUTPUT"
          # Extract the 66-character tx hash printed by payContributor.js as "   Tx hash : 0x..."
          TX_HASH=$(echo "$SCRIPT_OUTPUT" | grep -oP '(?<=Tx hash : )0x[0-9a-fA-F]{64}' || true)
          if [ -z "$TX_HASH" ]; then
            echo "::warning::Could not parse transaction hash from script output — check logs above."
          fi
          echo "tx_hash=$TX_HASH" >> "$GITHUB_OUTPUT"

      # ── 6. Post confirmation comment on the GitHub issue ──────────────────
      - name: Post confirmation comment
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          CONTRIBUTOR_ADDRESS: ${{ github.event.inputs.contributor_address }}
          AMOUNT_BNUT: ${{ github.event.inputs.amount_bnut }}
          NETWORK: ${{ github.event.inputs.network }}
          TX_HASH: ${{ steps.payout.outputs.tx_hash }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = parseInt(process.env.ISSUE_NUMBER, 10);
            const address = process.env.CONTRIBUTOR_ADDRESS;
            const amount = process.env.AMOUNT_BNUT;
            const network = process.env.NETWORK;
            const approver = context.actor;
            const txHash = process.env.TX_HASH || '';

            const explorerUrls = {
              polygon_mumbai:   'https://mumbai.polygonscan.com/tx/',
              base_sepolia:     'https://sepolia.basescan.org/tx/',
              optimism_sepolia: 'https://sepolia-optimistic.etherscan.io/tx/',
            };
            const explorerBase = explorerUrls[network] || '';

            const txLine = txHash
              ? `| 🔗 Transaction | [${txHash.slice(0, 10)}…](${explorerBase}${txHash}) |`
              : `| 🔗 Transaction | *Tx hash not captured — the payout likely succeeded; confirm by checking the [workflow run logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})* |`;

            const body = [
              `✅ **$BNUT Payout Sent** by @${approver}`,
              '',
              `| | |`,
              `|---|---|`,
              `| 💰 Amount | **${amount} BNUT** |`,
              `| 👛 Wallet | \`${address}\` |`,
              `| 🌐 Network | ${network} |`,
              txLine,
              `| 🔗 Workflow run | [View run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) |`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

            console.log(`Payout confirmation comment posted on issue #${issueNumber}`);
